# Nightly / manual retrieval-quality eval (master plan C4).
#
# ADVISORY mode: regressions are reported in the job log and summary but do
# not fail the job. Flip ADVISORY_FLAG to "" after two clean weeks to make the
# gate enforcing (see master plan C4 rollout note).
name: eval

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  retrieval-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ADVISORY_FLAG: "--advisory"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with ML extras (BGE-M3 stack)
        run: pip install -e ".[dev,ml]"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-m3-${{ runner.os }}

      - name: Preserve committed baseline
        run: cp tests/eval/reports/retrieval_baseline.json /tmp/committed_baseline.json

      - name: Run retrieval-quality eval (writes fresh report)
        run: python -m pytest tests/eval/test_retrieval_quality.py -v --tb=short

      - name: Run negative-answer compliance (stub LLM, CPU-only)
        run: python -m pytest tests/eval/test_negative_populated_corpus.py -v --tb=short

      - name: Run hallucination canary suite (ADR-0019 criterion 2, CPU-only)
        run: python -m pytest tests/eval/test_hallucination_canaries.py -v --tb=short

      - name: Compare fresh run against committed baseline
        run: |
          python -m tests.eval.harness.cli \
            --compare-baseline /tmp/committed_baseline.json \
            --candidate tests/eval/reports/retrieval_baseline.json \
            $ADVISORY_FLAG | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload fresh report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-eval-report
          path: tests/eval/reports/retrieval_baseline.json
