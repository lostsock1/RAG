# heldout-v1.yaml — 160-question seed evaluation set
# Phase 0 deliverable per ROADMAP.md and ADR-0003 (adapted per ADR-0004)
#
# All chunk_ids and page_ranges are null placeholders until the corpus is indexed.
# Questions are designed to be mappable to any textbook + loose-document corpus.
#
# Question type coverage:
#   definition (20), exact_lookup (20), formula (12), table (12),
#   multi_hop (12), comparison (8), chapter_synthesis (6),
#   contract_clause (10), report_section (10), email_thread (6),
#   policy_procedure (8), version_fact (6),
#   needle (20), negative (20), acl_leakage (10), multilingual (20), ocr_noise (5), deleted (5)
#
# Some questions serve multiple purposes (e.g., a needle question may also be multilingual).

dataset:
  name: "Heldout v1"
  version: "1.0.0"
  description: "170-question seed set for Phase 0–4 regression. 160 per ADR-0003 (50 textbook, 50 loose, 20 needle, 20 negative, 20 multilingual) plus 10 ACL leakage tests per EVALUATION_PLAN.md. Designed for any textbook + loose-document corpus."
  created: "2026-05-14"
  total_questions: 170
  language_distribution:
    en: 146
    de: 8
    pt: 8
    mixed: 8
  category_distribution:
    textbook: 58
    loose_document: 62
    cross_corpus: 50
  type_distribution:
    definition: 20
    exact_lookup: 20
    formula: 10
    table: 9
    multi_hop: 9
    chapter_synthesis: 7
    comparison: 6
    contract_clause: 12
    report_section: 12
    email_thread: 6
    policy_procedure: 10
    version_fact: 6
    needle: 20
    negative: 20
    acl_leakage: 10
    deleted_document: 4
  thresholds:
    faithfulness: 0.85
    citation_accuracy: 0.90
    negative_compliance: 0.90
    acl_leak_count: 0
    hallucination_rate: 0.05
    p50_latency_ms: 500

