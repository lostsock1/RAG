services:
  postgres:
    image: postgres:17
    container_name: uber-rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uber_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uber_rag}
      POSTGRES_DB: ${POSTGRES_DB:-uber_rag}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uber_rag} -d ${POSTGRES_DB:-uber_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: uber-rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: uber-rag-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
